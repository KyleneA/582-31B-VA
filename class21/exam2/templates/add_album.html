{% extends "base.html" %} {% block title %} Add Album {% endblock %} {% block
    content %}
    
    <h2>Add Album</h2>
    
    <form method="POST" action="{{ url_for('add_album') }}">
        <p>
                <label for="title">Title</label>
            
                <input id="title" name="title" type="text" required />
        </p>
    
        <p>
                <label for="artist">Artist</label>
            
                <input id="artist" name="artist" type="text" required />
        </p>
    
        <p>
            <label for="genre">Genre</label>
        
            <select id="genre" name="genre" required>
                <option value="">Choose a genre</option>
                {% for genre in genres %}
                <option value="{{ genre }}">{{ genre }}</option>
                {% endfor %}
            </select>
        </p>
    
        <p>
                <label for="year">Year</label>
            
                <input id="year" name="year" type="number" min="1850" step="1"/>
        </p>
    
        <p>
                <label for="stock">Stock</label>
            
                <input id="stock" name="stock" type="number" min="0" step="1" value="0" required />
        </p>
    
        <button type="submit">Save Album</button>
    </form>
    
    <p>
        <a href="{{ url_for('index') }}"> Cancel </a>
    </p>
    
{% endblock %}
