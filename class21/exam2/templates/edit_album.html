{% extends "base.html" %} {% block title %} Edit Album {% endblock %} {% block
    content %}
    
    <h2>Edit Album</h2>
    
    <form
        method="POST"
        action="{{ url_for(
                'edit_album',
                id=album.id
            ) }}"
    >
        <p>
            <label for="title">Title</label>
    
            <input
                id="title"
                name="title"
                type="text"
                value="{{ album.title }}"
                required
            />
        </p>
    
        <p>
            <label for="artist">Artist</label>
    
            <input
                id="artist"
                name="artist"
                type="text"
                value="{{ album.artist }}"
                required
            />
        </p>
    
        <p>
            <label for="genre">Genre</label>
        
            <select id="genre" name="genre" required>
                <option value="">Choose a genre</option>
                    {% for genre in genres %}
                        {% if album.genre == genre %}
                            <option 
                                value="{{ genre }}"
                                selected
                            >
                            {{ genre }}
                            </option>
                        {% else %}
                            <option 
                            value="{{ genre }}"
                            >
                            {{ genre }}
                            </option>
                        {% endif %}
                    {% endfor %}
            </select>
        </p>
    
        <p>
            <label for="year">Year</label>
        
            <input
                id="year"
                name="year"
                type="number"
                value="{{ album.year }}"
                min="1850"
                step="1"
                required
            />
        </p>
    
        <p>
        <label for="stock">Stock</label>
    
            <input
                id="stock"
                name="stock"
                type="number"
                min="0"
                value="{{ album.stock }}"
                step="1"
                required
            />
        </p>
    
        <button type="submit">Update Album</button>
    </form>
    
    <p>
        <a href="{{ url_for('index') }}"> Cancel </a>
    </p>
    
{% endblock %}
