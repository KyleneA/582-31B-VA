<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 20</title>
</head>
<body>
    <main>
        <p>
            <a href="/add"> click here to add new movie </a>
        </p>

        {% if movies %}
            <ul>
                {% for movie in movies %}
                <li> 
                    <strong> {{ movie.title }} ({{ movie.year }}) </strong> | {{movie.genre}} |
                    [<a href="{{ url_for('edit_movie', movie_id=movie.id) }}">edit</a>]
                    [<a href="{{ url_for('delete_movie', movie_id=movie.id) }}">delete</a>]
                </li>
                {% endfor %}
            </ul>
        {% else %}
        <p>No movies in the database yet. </p>
        {% endif %}
    </main>
</body>
</html>
